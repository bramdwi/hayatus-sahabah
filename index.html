<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hayatus Sahabah — Jilid 1</title>
<meta name="description" content="Hayatus Sahabah: kisah kehidupan para sahabat Nabi ﷺ, dibaca dengan tenang." />
<meta name="theme-color" content="#1c3d2e" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hayatus Sahabah" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ===== App shell ===== -->
<div id="app">

  <!-- Top bar -->
  <header class="topbar">
    <button id="menuBtn" class="icon-btn" aria-label="Buka daftar isi" aria-expanded="false" aria-controls="drawer">
      <span class="hamburger"><i></i><i></i><i></i></span>
    </button>
    <div class="topbar-title">
      <span class="topbar-kicker" id="topbarVolume">Jilid 1</span>
      <span class="topbar-chapter" id="topbarChapter">Memuat…</span>
    </div>
    <button id="fontBtn" class="icon-btn" aria-label="Pengaturan tampilan baca" aria-expanded="false" aria-controls="fontPanel">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M9.93 3h4.14l6.36 17h-3.13l-1.53-4.2H8.23L6.7 20H3.57L9.93 3zm.66 3.36L8.9 13.2h6.2l-1.7-6.84a24 24 0 0 1-.6-2.6h-.1c-.16.9-.36 1.76-.6 2.6z"/></svg>
    </button>
  </header>

  <!-- Reading progress -->
  <div class="progress-track" aria-hidden="true"><div id="progressFill" class="progress-fill"></div></div>

  <!-- Offline / install banners -->
  <div id="offlineBanner" class="status-banner" hidden>Mode luring — bacaan tetap tersedia tanpa internet.</div>
  <div id="installBanner" class="status-banner install" hidden>
    <span>Pasang Hayatus Sahabah di layar utama untuk membaca seperti aplikasi.</span>
    <button id="installBtn" class="pill-btn">Pasang</button>
    <button id="dismissInstall" class="text-btn" aria-label="Tutup">Nanti</button>
  </div>

  <!-- Main reading surface -->
  <main id="reader" class="reader">
    <div id="chapterStage" class="chapter-stage">
      <!-- chapter content injected here -->
    </div>
  </main>

  <!-- Footer chapter nav -->
  <footer class="footnav">
    <button id="prevBtn" class="nav-btn" aria-label="Kisah sebelumnya">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.4 6.4 9.8 12l5.6 5.6-1.4 1.4L7 12l7-7z"/></svg>
      <span>Sebelumnya</span>
    </button>
    <span id="footProgress" class="foot-progress">1 / 35</span>
    <button id="nextBtn" class="nav-btn nav-btn-next" aria-label="Kisah berikutnya">
      <span>Berikutnya</span>
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="m8.6 17.6 5.6-5.6-5.6-5.6L10 5l7 7-7 7z"/></svg>
    </button>
  </footer>

</div>

<!-- Drawer / hamburger TOC -->
<div id="drawerOverlay" class="drawer-overlay" hidden></div>
<nav id="drawer" class="drawer" aria-label="Daftar isi" aria-hidden="true">
  <div class="drawer-head">
    <div class="drawer-emblem">
      <svg viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">
        <circle cx="24" cy="24" r="22" fill="none" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="24" cy="24" r="17" fill="none" stroke="currentColor" stroke-width="0.6"/>
        <path d="M24 8 L27 20 L39 20 L29 27 L33 39 L24 31 L15 39 L19 27 L9 20 L21 20 Z" fill="none" stroke="currentColor" stroke-width="0.8"/>
      </svg>
    </div>
    <h2>Hayatus Sahabah</h2>
    <p class="drawer-sub">Kehidupan Para Sahabat raḍiyallāhu 'anhum</p>
  </div>

  <div class="volume-tabs" id="volumeTabs"></div>

  <div class="drawer-list-wrap">
    <ol id="drawerList" class="drawer-list"></ol>
  </div>

  <button id="closeDrawer" class="icon-btn drawer-close" aria-label="Tutup daftar isi">
    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4z"/><path fill="currentColor" d="M17.6 5 5 17.6 6.4 19 19 6.4z"/></svg>
  </button>
</nav>

<!-- Font / display settings panel -->
<div id="fontOverlay" class="drawer-overlay" hidden></div>
<div id="fontPanel" class="font-panel" aria-hidden="true">
  <div class="font-panel-row">
    <span class="font-panel-label">Ukuran huruf</span>
    <div class="stepper">
      <button id="fontDown" class="stepper-btn" aria-label="Perkecil huruf">A−</button>
      <span id="fontSizeLabel" class="stepper-val">100%</span>
      <button id="fontUp" class="stepper-btn" aria-label="Perbesar huruf">A+</button>
    </div>
  </div>
  <div class="font-panel-row">
    <span class="font-panel-label">Latar baca</span>
    <div class="theme-swatches">
      <button class="swatch swatch-cream active" data-theme="cream" aria-label="Krem hangat"></button>
      <button class="swatch swatch-sepia" data-theme="sepia" aria-label="Sepia"></button>
      <button class="swatch swatch-night" data-theme="night" aria-label="Malam"></button>
    </div>
  </div>
</div>

<script>
  // Visible failure state instead of a silent, endless "Memuat…" —
  // shows exactly what went wrong so it's diagnosable from the phone itself.
  function hayatusShowLoadError(reason) {
    var stage = document.getElementById('chapterStage');
    if (!stage) return;
    stage.innerHTML =
      '<div style="text-align:center;padding:3rem 1rem;font-family:Inter,system-ui,sans-serif;color:#3c3527;">' +
      '<p style="font-size:1rem;font-weight:600;margin-bottom:.4rem;">Gagal memuat kisah</p>' +
      '<p style="font-size:.85rem;color:#6b6252;margin-bottom:1.2rem;">' + reason + '</p>' +
      '<button onclick="location.reload(true)" style="background:#1c3d2e;color:#faf5e8;border:none;border-radius:999px;padding:.6rem 1.3rem;font-size:.85rem;font-weight:600;">Muat Ulang</button>' +
      '</div>';
  }
  window.addEventListener('error', function (e) {
    if (typeof HAYATUS_DATA === 'undefined') {
      hayatusShowLoadError('File data.js atau app.js tidak berhasil dimuat dari server. Cek apakah semua file (data.js, app.js, styles.css) benar-benar ter-upload sejajar dengan index.html.');
    }
  });
  window.hayatusLoadTimeout = setTimeout(function () {
    if (typeof HAYATUS_DATA === 'undefined' || !document.querySelector('.chapter')) {
      hayatusShowLoadError('Memuat terlalu lama — kemungkinan salah satu file (data.js / app.js / styles.css) tidak ditemukan di server. Coba muat ulang, atau periksa alamat file langsung, misalnya: ' + location.origin + '/data.js');
    }
  }, 6000);
</script>
<script src="data.js" onerror="hayatusShowLoadError('File data.js tidak ditemukan (404). Pastikan file ini ter-upload sejajar dengan index.html.')"></script>
<script src="app.js" onerror="hayatusShowLoadError('File app.js tidak ditemukan (404). Pastikan file ini ter-upload sejajar dengan index.html.')"></script>
</body>
</html>
